<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - BillFlow</title>
  <meta name="description" content="Manage your product inventory">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css?v=4">

  <!-- Firebase Setup -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js",
        "firebase/analytics": "https://www.gstatic.com/firebasejs/11.1.0/firebase-analytics.js",
        "firebase/data-connect": "https://www.gstatic.com/firebasejs/11.1.0/firebase-data-connect.js"
      }
    }
  </script>
  <script type="module" src="assets/js/firebase-init.js?v=3"></script>
</head>
<body>
  <div class="app-wrapper">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="top-navbar" id="top-navbar"></header>
      <main class="content-area">

        <div class="page-header">
          <div>
            <h1>Products</h1>
            <p>Manage your product catalog and inventory</p>
          </div>
          <button class="btn btn-primary" onclick="openProductModal()" id="btn-add-product">
            <i class="bi bi-plus-lg"></i> Add Product
          </button>
        </div>

        <!-- Filters -->
        <div class="card mb-20">
          <div class="card-body" style="padding:12px 20px">
            <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap">
              <div class="navbar-search" style="width:280px">
                <i class="bi bi-search"></i>
                <input type="text" placeholder="Search products..." id="product-search" oninput="filterProducts()">
              </div>
              <select class="form-control" style="width:180px" id="filter-category" onchange="filterProducts()">
                <option value="">All Categories</option>
              </select>
              <select class="form-control" style="width:140px" id="filter-status" onchange="filterProducts()">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
              <span class="text-sm text-muted" id="product-count"></span>
            </div>
          </div>
        </div>

        <!-- Products Table -->
        <div class="card">
          <div class="card-body" style="padding:0">
            <div class="table-container">
              <table class="data-table" id="products-table">
                <thead>
                  <tr>
                    <th>HSN Code</th>
                    <th>Product Name</th>
                    <th>Category</th>
                    <th>Stock</th>
                    <th>GST %</th>
                    <th>Rate (₹)</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="products-body"></tbody>
              </table>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Product Modal -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal-box modal-compact">
      <div class="modal-header">
        <h5 id="product-modal-title">Add Product</h5>
        <button class="modal-close" onclick="closeProductModal()" id="btn-close-product-modal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="product-form" onsubmit="return saveProduct(event)">
          <input type="hidden" id="product-edit-id">
          <div class="grid-2">
            <div class="form-group">
              <label for="p-name">Product Name *</label>
              <input type="text" class="form-control" id="p-name" required>
            </div>
            <div class="form-group">
              <label for="p-hsn">HSN Code</label>
              <input type="text" class="form-control" id="p-hsn" placeholder="e.g. 5208">
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label for="p-code">Product Code</label>
              <input type="text" class="form-control" id="p-code">
            </div>
            <div class="form-group">
              <label for="p-category">Category *</label>
              <input type="text" class="form-control" id="p-category" list="category-list" placeholder="Select or type..." required>
              <datalist id="category-list"></datalist>
            </div>
          </div>
          <div class="grid-3">
            <div class="form-group">
              <label for="p-unit">Unit</label>
              <input type="text" class="form-control" id="p-unit" list="unit-list" placeholder="Select or type...">
              <datalist id="unit-list"></datalist>
            </div>
            <div class="form-group">
              <label for="p-gst">GST % *</label>
              <select class="form-control" id="p-gst" required></select>
            </div>
            <div class="form-group">
              <label for="p-rate">Rate (₹) *</label>
              <input type="number" class="form-control" id="p-rate" min="0" step="0.01" required>
            </div>
          </div>
          <div class="grid-3">
            <div class="form-group">
              <label for="p-stock">Stock Qty *</label>
              <input type="number" class="form-control" id="p-stock" min="0" required>
            </div>
            <div class="form-group">
              <label for="p-size">Size</label>
              <input type="text" class="form-control" id="p-size" list="size-list" placeholder="Select or type...">
              <datalist id="size-list"></datalist>
            </div>
            <div class="form-group">
              <label for="p-status">Status</label>
              <select class="form-control" id="p-status">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label for="p-desc">Description</label>
            <textarea class="form-control" id="p-desc" rows="1"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeProductModal()" id="btn-cancel-product">Cancel</button>
        <button class="btn btn-primary" onclick="document.getElementById('product-form').requestSubmit()" id="btn-save-product">
          <i class="bi bi-check-lg"></i> Save Product
        </button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal-box" style="max-width:400px">
      <div class="modal-header">
        <h5>Confirm Delete</h5>
        <button class="modal-close" onclick="closeDeleteModal()" id="btn-close-delete">&times;</button>
      </div>
      <div class="modal-body text-center">
        <i class="bi bi-exclamation-triangle" style="font-size:3rem;color:var(--danger);display:block;margin-bottom:12px"></i>
        <p>Are you sure you want to delete this product?<br>This action cannot be undone.</p>
      </div>
      <div class="modal-footer" style="justify-content:center">
        <button class="btn btn-outline" onclick="closeDeleteModal()" id="btn-cancel-delete">Cancel</button>
        <button class="btn btn-danger" id="btn-confirm-delete" onclick="confirmDelete()">
          <i class="bi bi-trash"></i> Delete
        </button>
      </div>
    </div>
  </div>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/components.js"></script>
  <script>
    Components.init('Products');

    let deleteTargetId = null;

    function populateDatalists() {
      // Categories datalist
      const catList = document.getElementById('category-list');
      if (catList) {
        catList.innerHTML = Store.categories.map(c => `<option value="${c}">`).join('');
      }
      
      // Filter Category dropdown
      const filterCat = document.getElementById('filter-category');
      if (filterCat) {
        const currentSel = filterCat.value;
        filterCat.innerHTML = '<option value="">All Categories</option>' + 
          Store.categories.map(c => `<option value="${c}">${c}</option>`).join('');
        filterCat.value = currentSel;
      }

      // Units datalist
      const unitList = document.getElementById('unit-list');
      if (unitList) {
        unitList.innerHTML = Store.units.map(u => `<option value="${u}">`).join('');
      }

      // Sizes datalist
      const sizeList = document.getElementById('size-list');
      if (sizeList) {
        sizeList.innerHTML = (Store.sizes || []).map(s => `<option value="${s}">`).join('');
      }

      // GST Rates Select
      const gstSelect = document.getElementById('p-gst');
      if (gstSelect) {
        const currentSel = gstSelect.value;
        gstSelect.innerHTML = Store.gstRates.map(g => `<option value="${g}">${g}%</option>`).join('');
        if (currentSel && Store.gstRates.includes(Number(currentSel))) {
          gstSelect.value = currentSel;
        } else {
          gstSelect.value = Store.company.defaultGst || '18';
        }
      }
    }

    // Initial population of dropdowns and datalists
    populateDatalists();

    function renderProducts(products) {
      const tbody = document.getElementById('products-body');
      document.getElementById('product-count').textContent = `Showing ${products.length} products`;

      if (!products.length) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><i class="bi bi-box-seam"></i><h5>No products found</h5><p>Add your first product to get started</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = products.map(p => `
        <tr>
          <td><code style="font-size:0.8rem;background:var(--bg);padding:2px 6px;border-radius:4px">${p.hsn || '—'}</code></td>
          <td><strong>${p.name}</strong><br><span class="text-sm text-muted">${p.code}</span></td>
          <td>${p.category}</td>
          <td>
            <span class="${p.stock <= 10 ? (p.stock <= 5 ? 'badge badge-danger' : 'badge badge-warning') : ''}">${p.stock} ${p.unit}</span>
          </td>
          <td>${p.gst}%</td>
          <td><strong>${Utils.currency(p.rate)}</strong></td>
          <td>
            <span class="badge ${p.status === 'active' ? 'badge-success' : 'badge-danger'}">
              <span class="status-dot ${p.status}"></span>${p.status}
            </span>
          </td>
          <td>
            <div style="display:flex;gap:6px">
              <button class="btn-icon edit" title="Edit" onclick="editProduct(${p.id})"><i class="bi bi-pencil"></i></button>
              <button class="btn-icon delete" title="Delete" onclick="deleteProduct(${p.id})"><i class="bi bi-trash"></i></button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function filterProducts() {
      let products = Store.getProducts();
      const search = document.getElementById('product-search').value;
      const cat = document.getElementById('filter-category').value;
      const status = document.getElementById('filter-status').value;

      if (search) products = Utils.searchFilter(products, search, ['name', 'hsn', 'code']);
      if (cat) products = products.filter(p => p.category === cat);
      if (status) products = products.filter(p => p.status === status);

      renderProducts(products);
    }

    function openProductModal(product = null) {
      document.getElementById('product-modal').classList.add('active');
      document.getElementById('product-form').reset();
      document.getElementById('product-edit-id').value = '';
      document.getElementById('product-modal-title').textContent = product ? 'Edit Product' : 'Add Product';

      if (product) {
        document.getElementById('product-edit-id').value = product.id;
        document.getElementById('p-name').value = product.name;
        document.getElementById('p-hsn').value = product.hsn || '';
        document.getElementById('p-code').value = product.code;
        document.getElementById('p-category').value = product.category;
        document.getElementById('p-unit').value = product.unit;
        document.getElementById('p-gst').value = product.gst;
        document.getElementById('p-rate').value = product.rate;
        document.getElementById('p-stock').value = product.stock;
        document.getElementById('p-size').value = product.size || '';
        document.getElementById('p-status').value = product.status;
        document.getElementById('p-desc').value = product.description || '';
      }
    }

    function closeProductModal() { document.getElementById('product-modal').classList.remove('active'); }

    function editProduct(id) { openProductModal(Store.getProductById(id)); }

    function deleteProduct(id) {
      deleteTargetId = id;
      document.getElementById('delete-modal').classList.add('active');
    }

    function closeDeleteModal() { document.getElementById('delete-modal').classList.remove('active'); }

    function confirmDelete() {
      if (deleteTargetId) {
        Store.deleteProduct(deleteTargetId);
        Utils.showToast('Product deleted successfully');
        filterProducts();
        closeDeleteModal();
      }
    }

    function saveProduct(e) {
      e.preventDefault();
      const editId = document.getElementById('product-edit-id').value;
      
      const categoryVal = document.getElementById('p-category').value.trim();
      const unitVal = document.getElementById('p-unit').value.trim();
      const sizeVal = document.getElementById('p-size').value.trim();

      // Automatically add new values to Store if they don't exist
      let updatedStore = false;
      if (categoryVal && !Store.categories.some(c => c.toLowerCase() === categoryVal.toLowerCase())) {
        Store.categories.push(categoryVal);
        updatedStore = true;
      }
      if (unitVal && !Store.units.some(u => u.toLowerCase() === unitVal.toLowerCase())) {
        Store.units.push(unitVal);
        updatedStore = true;
      }
      if (sizeVal && !Store.sizes.some(s => s.toLowerCase() === sizeVal.toLowerCase())) {
        Store.sizes.push(sizeVal);
        updatedStore = true;
      }
      if (updatedStore) {
        Store._save();
        populateDatalists();
      }

      const data = {
        name: document.getElementById('p-name').value,
        hsn: document.getElementById('p-hsn').value.trim(),
        code: document.getElementById('p-code').value,
        category: categoryVal,
        unit: unitVal,
        gst: Number(document.getElementById('p-gst').value),
        rate: Number(document.getElementById('p-rate').value),
        stock: Number(document.getElementById('p-stock').value),
        size: sizeVal,
        status: document.getElementById('p-status').value,
        description: document.getElementById('p-desc').value
      };

      if (editId) {
        Store.updateProduct(Number(editId), data);
        Utils.showToast('Product updated successfully');
      } else {
        Store.addProduct(data);
        Utils.showToast('Product added successfully');
      }

      closeProductModal();
      filterProducts();
      return false;
    }

    // Initial render
    filterProducts();

    // Check URL parameters to auto-open modal
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('action') === 'add') {
      openProductModal();
    } else if (urlParams.get('edit')) {
      const pId = Number(urlParams.get('edit'));
      if (pId) editProduct(pId);
    }
  </script>
</body>
</html>
