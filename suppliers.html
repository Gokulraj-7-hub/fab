<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suppliers - BillFlow</title>
  <meta name="description" content="Manage your suppliers">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css?v=4">
</head>
<body>
  <div class="app-wrapper">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="top-navbar" id="top-navbar"></header>
      <main class="content-area">

        <div class="page-header">
          <div>
            <h1>Suppliers</h1>
            <p>Manage your supplier database</p>
          </div>
          <button class="btn btn-primary" onclick="openSupplierModal()" id="btn-add-supplier">
            <i class="bi bi-plus-lg"></i> Add Supplier
          </button>
        </div>

        <!-- Search -->
        <div class="card mb-20">
          <div class="card-body" style="padding:12px 20px">
            <div style="display:flex;gap:12px;align-items:center">
              <div class="navbar-search" style="width:320px">
                <i class="bi bi-search"></i>
                <input type="text" placeholder="Search suppliers..." id="supplier-search" oninput="filterSuppliers()">
              </div>
              <span class="text-sm text-muted" id="supplier-count"></span>
            </div>
          </div>
        </div>

        <!-- Suppliers Table -->
        <div class="card">
          <div class="card-body" style="padding:0">
            <div class="table-container">
              <table class="data-table" id="suppliers-table">
                <thead>
                  <tr>
                    <th>Supplier Name</th>
                    <th>GSTIN</th>
                    <th>Mobile</th>
                    <th>Email</th>
                    <th>Address</th>
                    <th>State</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="suppliers-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Supplier Modal -->
  <div class="modal-overlay" id="supplier-modal">
    <div class="modal-box modal-compact">
      <div class="modal-header">
        <h5 id="supplier-modal-title">Add Supplier</h5>
        <button class="modal-close" onclick="closeSupplierModal()" id="btn-close-supplier-modal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="supplier-form" onsubmit="return saveSupplier(event)">
          <input type="hidden" id="s-edit-id">
          <div class="grid-2">
            <div class="form-group">
              <label for="s-name">Supplier Name *</label>
              <input type="text" class="form-control" id="s-name" required>
            </div>
            <div class="form-group">
              <label for="s-gstin">GSTIN</label>
              <input type="text" class="form-control" id="s-gstin" placeholder="e.g. 33AABCT1332L1ZZ" maxlength="15">
            </div>
          </div>
          <div class="grid-3">
            <div class="form-group">
              <label for="s-mobile">Mobile Number 1 *</label>
              <input type="tel" class="form-control" id="s-mobile" pattern="[0-9]{10}" maxlength="10" required>
            </div>
            <div class="form-group">
              <label for="s-mobile2">Mobile Number 2</label>
              <input type="tel" class="form-control" id="s-mobile2" pattern="[0-9]{10}" maxlength="10">
            </div>
            <div class="form-group">
              <label for="s-email">Email</label>
              <input type="email" class="form-control" id="s-email">
            </div>
          </div>
          <div class="form-group">
            <label for="s-address">Address *</label>
            <textarea class="form-control" id="s-address" rows="1" required></textarea>
          </div>
          <div class="grid-4">
            <div class="form-group" style="margin-bottom:0">
              <label for="s-state">State *</label>
              <select class="form-control" id="s-state" required></select>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label for="s-district">District</label>
              <input type="text" class="form-control" id="s-district" placeholder="District">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label for="s-taluk">Taluk</label>
              <input type="text" class="form-control" id="s-taluk" placeholder="Taluk">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label for="s-pincode">Pincode</label>
              <input type="text" class="form-control" id="s-pincode" pattern="[0-9]{6}" maxlength="6">
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeSupplierModal()" id="btn-cancel-supplier">Cancel</button>
        <button class="btn btn-primary" onclick="document.getElementById('supplier-form').requestSubmit()" id="btn-save-supplier">
          <i class="bi bi-check-lg"></i> Save Supplier
        </button>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal-box" style="max-width:400px">
      <div class="modal-header">
        <h5>Confirm Delete</h5>
        <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
      </div>
      <div class="modal-body text-center">
        <i class="bi bi-exclamation-triangle" style="font-size:3rem;color:var(--danger);display:block;margin-bottom:12px"></i>
        <p>Are you sure you want to delete this supplier?</p>
      </div>
      <div class="modal-footer" style="justify-content:center">
        <button class="btn btn-outline" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn btn-danger" onclick="confirmDelete()"><i class="bi bi-trash"></i> Delete</button>
      </div>
    </div>
  </div>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/components.js"></script>
  <script>
    Components.init('Suppliers');
    let deleteTargetId = null;

    // Populate states
    const stateSelect = document.getElementById('s-state');
    stateSelect.innerHTML = '<option value="">Select State</option>';
    Store.states.forEach(s => { stateSelect.innerHTML += `<option value="${s}">${s}</option>`; });

    function renderSuppliers(suppliers) {
      const tbody = document.getElementById('suppliers-body');
      document.getElementById('supplier-count').textContent = `Showing ${suppliers.length} suppliers`;

      if (!suppliers.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="bi bi-truck"></i><h5>No suppliers found</h5><p>Add your first supplier</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = suppliers.map(s => `
        <tr>
          <td><strong>${s.name}</strong></td>
          <td><code style="font-size:0.75rem;background:var(--bg);padding:2px 6px;border-radius:4px">${s.gstin || '—'}</code></td>
          <td>${s.mobile}${s.mobile2 ? ', ' + s.mobile2 : ''}</td>
          <td>${s.email || '—'}</td>
          <td class="text-sm">${s.address}</td>
          <td>${s.state}</td>
          <td>
            <div style="display:flex;gap:6px">
              <button class="btn-icon edit" title="Edit" onclick="editSupplier(${s.id})"><i class="bi bi-pencil"></i></button>
              <button class="btn-icon delete" title="Delete" onclick="deleteSupplier(${s.id})"><i class="bi bi-trash"></i></button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function filterSuppliers() {
      let suppliers = Store.getSuppliers();
      const q = document.getElementById('supplier-search').value;
      if (q) suppliers = Utils.searchFilter(suppliers, q, ['name', 'gstin', 'mobile', 'mobile2', 'email']);
      renderSuppliers(suppliers);
    }

    function openSupplierModal(supplier = null) {
      document.getElementById('supplier-modal').classList.add('active');
      document.getElementById('supplier-form').reset();
      document.getElementById('s-edit-id').value = '';
      document.getElementById('supplier-modal-title').textContent = supplier ? 'Edit Supplier' : 'Add Supplier';
      if (supplier) {
        document.getElementById('s-edit-id').value = supplier.id;
        document.getElementById('s-name').value = supplier.name;
        document.getElementById('s-gstin').value = supplier.gstin;
        document.getElementById('s-mobile').value = supplier.mobile;
        document.getElementById('s-mobile2').value = supplier.mobile2 || '';
        document.getElementById('s-email').value = supplier.email;
        document.getElementById('s-address').value = supplier.address;
        document.getElementById('s-state').value = supplier.state;
        document.getElementById('s-district').value = supplier.district || '';
        document.getElementById('s-taluk').value = supplier.taluk || '';
        document.getElementById('s-pincode').value = supplier.pincode;
      }
    }

    function closeSupplierModal() { document.getElementById('supplier-modal').classList.remove('active'); }
    function editSupplier(id) { openSupplierModal(Store.getSupplierById(id)); }
    function deleteSupplier(id) { deleteTargetId = id; document.getElementById('delete-modal').classList.add('active'); }
    function closeDeleteModal() { document.getElementById('delete-modal').classList.remove('active'); }
    function confirmDelete() {
      if (deleteTargetId) { Store.deleteSupplier(deleteTargetId); Utils.showToast('Supplier deleted'); filterSuppliers(); closeDeleteModal(); }
    }

    function saveSupplier(e) {
      e.preventDefault();
      const editId = document.getElementById('s-edit-id').value;
      const data = {
        name: document.getElementById('s-name').value,
        gstin: document.getElementById('s-gstin').value,
        mobile: document.getElementById('s-mobile').value,
        mobile2: document.getElementById('s-mobile2').value,
        email: document.getElementById('s-email').value,
        address: document.getElementById('s-address').value,
        state: document.getElementById('s-state').value,
        district: document.getElementById('s-district').value.trim(),
        taluk: document.getElementById('s-taluk').value.trim(),
        pincode: document.getElementById('s-pincode').value
      };
      if (editId) { Store.updateSupplier(Number(editId), data); Utils.showToast('Supplier updated'); }
      else { Store.addSupplier(data); Utils.showToast('Supplier added'); }
      closeSupplierModal();
      filterSuppliers();
      return false;
    }

    filterSuppliers();

    // Check URL parameters to auto-open modal
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('action') === 'add') {
      openSupplierModal();
    }
  </script>
</body>
</html>
