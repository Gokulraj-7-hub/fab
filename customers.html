<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers - BillFlow</title>
  <meta name="description" content="Manage your customers">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css?v=5">

  <!-- Firebase Setup -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js",
        "firebase/analytics": "https://www.gstatic.com/firebasejs/11.1.0/firebase-analytics.js",
        "firebase/data-connect": "https://www.gstatic.com/firebasejs/11.1.0/firebase-data-connect.js"
      }
    }
  </script>
  <script type="module" src="assets/js/firebase-init.js?v=3"></script>
</head>
<body>
  <div class="app-wrapper">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="top-navbar" id="top-navbar"></header>
      <main class="content-area">

        <div class="page-header">
          <div>
            <h1>Customers</h1>
            <p>Manage your customer database</p>
          </div>
          <button class="btn btn-primary" onclick="openCustomerModal()" id="btn-add-customer">
            <i class="bi bi-plus-lg"></i> Add Customer
          </button>
        </div>

        <!-- Search -->
        <div class="card mb-20">
          <div class="card-body" style="padding:12px 20px">
            <div style="display:flex;gap:12px;align-items:center">
              <div class="navbar-search" style="width:320px">
                <i class="bi bi-search"></i>
                <input type="text" placeholder="Search customers..." id="customer-search" oninput="filterCustomers()">
              </div>
              <span class="text-sm text-muted" id="customer-count"></span>
            </div>
          </div>
        </div>

        <!-- Customers Table -->
        <div class="card">
          <div class="card-body" style="padding:0">
            <div class="table-container">
              <table class="data-table" id="customers-table">
                <thead>
                  <tr>
                    <th>Customer Name</th>
                    <th>GSTIN</th>
                    <th>Mobile</th>
                    <th>Email</th>
                    <th>Address</th>
                    <th>State</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="customers-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Customer Modal -->
  <div class="modal-overlay" id="customer-modal">
    <div class="modal-box modal-compact">
      <div class="modal-header">
        <h5 id="customer-modal-title">Add Customer</h5>
        <button class="modal-close" onclick="closeCustomerModal()" id="btn-close-customer-modal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="customer-form" onsubmit="return saveCustomer(event)">
          <input type="hidden" id="c-edit-id">
          <div class="grid-2">
            <div class="form-group">
              <label for="c-name">Customer Name *</label>
              <input type="text" class="form-control" id="c-name" required>
            </div>
            <div class="form-group">
              <label for="c-gstin">GSTIN</label>
              <input type="text" class="form-control" id="c-gstin" placeholder="e.g. 33AABCT1332L1ZZ" maxlength="15">
            </div>
          </div>
          <div class="grid-3">
            <div class="form-group">
              <label for="c-mobile">Mobile Number 1 *</label>
              <input type="tel" class="form-control" id="c-mobile" pattern="[0-9]{10}" maxlength="10" required>
            </div>
            <div class="form-group">
              <label for="c-mobile2">Mobile Number 2</label>
              <input type="tel" class="form-control" id="c-mobile2" pattern="[0-9]{10}" maxlength="10">
            </div>
            <div class="form-group">
              <label for="c-email">Email</label>
              <input type="email" class="form-control" id="c-email">
            </div>
          </div>
          <div class="form-group">
            <label for="c-address">Address *</label>
            <textarea class="form-control" id="c-address" rows="1" required></textarea>
          </div>
          <div class="grid-4">
            <div class="form-group" style="margin-bottom:0">
              <label for="c-state">State *</label>
              <input type="text" class="form-control" id="c-state" placeholder="Select State">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label for="c-district">District</label>
              <input type="text" class="form-control" id="c-district" placeholder="Select District">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label for="c-taluk">Taluk</label>
              <input type="text" class="form-control" id="c-taluk" placeholder="Enter Taluk">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label for="c-pincode">Pincode</label>
              <input type="text" class="form-control" id="c-pincode" pattern="[0-9]{6}" maxlength="6">
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeCustomerModal()" id="btn-cancel-customer">Cancel</button>
        <button class="btn btn-primary" onclick="document.getElementById('customer-form').requestSubmit()" id="btn-save-customer">
          <i class="bi bi-check-lg"></i> Save Customer
        </button>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal-box" style="max-width:400px">
      <div class="modal-header">
        <h5>Confirm Delete</h5>
        <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
      </div>
      <div class="modal-body text-center">
        <i class="bi bi-exclamation-triangle" style="font-size:3rem;color:var(--danger);display:block;margin-bottom:12px"></i>
        <p>Are you sure you want to delete this customer?</p>
      </div>
      <div class="modal-footer" style="justify-content:center">
        <button class="btn btn-outline" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn btn-danger" onclick="confirmDelete()"><i class="bi bi-trash"></i> Delete</button>
      </div>
    </div>
  </div>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/location-dropdown.js"></script>
  <script>
    Components.init('Customers');
    let deleteTargetId = null;
    let locDropdown = null;
    let allCustomers = [];

    // Initialize cascading location dropdowns
    LocationDropdown.init({
      stateEl: '#c-state',
      districtEl: '#c-district',
      talukEl: '#c-taluk'
    }).then(instance => { locDropdown = instance; });

    async function loadCustomers() {
      if (!window.listCustomers) {
        setTimeout(loadCustomers, 100);
        return;
      }
      try {
        const res = await window.listCustomers();
        allCustomers = res.data.customers;
        filterCustomers();
      } catch (err) {
        console.error('Error loading customers:', err);
      }
    }

    function renderCustomers(customers) {
      const tbody = document.getElementById('customers-body');
      document.getElementById('customer-count').textContent = `Showing ${customers.length} customers`;

      if (!customers.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="bi bi-people"></i><h5>No customers found</h5><p>Add your first customer</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = customers.map(c => `
        <tr>
          <td><strong>${c.name}</strong></td>
          <td><code style="font-size:0.75rem;background:var(--bg);padding:2px 6px;border-radius:4px">${c.gstin || '—'}</code></td>
          <td>${c.mobile}${c.mobile2 ? ', ' + c.mobile2 : ''}</td>
          <td>${c.email || '—'}</td>
          <td class="text-sm">${c.address}</td>
          <td>${c.state ? c.state.name : '—'}</td>
          <td>
            <div style="display:flex;gap:6px">
              <button class="btn-icon edit" title="Edit" onclick="editCustomer('${c.id}')"><i class="bi bi-pencil"></i></button>
              <button class="btn-icon delete" title="Delete" onclick="deleteCustomer('${c.id}')"><i class="bi bi-trash"></i></button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function filterCustomers() {
      let customers = [...allCustomers];
      const q = document.getElementById('customer-search').value;
      if (q) customers = Utils.searchFilter(customers, q, ['name', 'gstin', 'mobile', 'mobile2', 'email']);
      renderCustomers(customers);
    }

    function openCustomerModal(customer = null) {
      document.getElementById('customer-modal').classList.add('active');
      document.getElementById('customer-form').reset();
      document.getElementById('c-edit-id').value = '';
      document.getElementById('customer-modal-title').textContent = customer ? 'Edit Customer' : 'Add Customer';
      if (locDropdown) locDropdown.clear();
      if (customer) {
        document.getElementById('c-edit-id').value = customer.id;
        document.getElementById('c-name').value = customer.name;
        document.getElementById('c-gstin').value = customer.gstin;
        document.getElementById('c-mobile').value = customer.mobile;
        document.getElementById('c-mobile2').value = customer.mobile2 || '';
        document.getElementById('c-email').value = customer.email;
        document.getElementById('c-address').value = customer.address;
        document.getElementById('c-pincode').value = customer.pincode || '';
        if (locDropdown) {
          locDropdown.setValues(
            customer.state ? customer.state.name : '', 
            customer.district ? customer.district.name : '', 
            customer.taluk ? customer.taluk.name : ''
          );
        }
      }
    }

    function closeCustomerModal() { document.getElementById('customer-modal').classList.remove('active'); }
    function editCustomer(id) { 
      const customer = allCustomers.find(c => c.id === id);
      openCustomerModal(customer); 
    }
    function deleteCustomer(id) { deleteTargetId = id; document.getElementById('delete-modal').classList.add('active'); }
    function closeDeleteModal() { document.getElementById('delete-modal').classList.remove('active'); }
    
    async function confirmDelete() {
      if (deleteTargetId) {
        try {
          await window.deleteCustomer({ id: deleteTargetId });
          Utils.showToast('Customer deleted');
          closeDeleteModal();
          loadCustomers();
        } catch (err) {
          console.error('Delete failed:', err);
          Utils.showToast('Failed to delete customer');
        }
      }
    }

    async function saveCustomer(e) {
      e.preventDefault();

      // Basic validation
      const stateInput = document.getElementById('c-state').value || (locDropdown ? locDropdown.getValues().state : '');
      if (!stateInput) {
        Utils.showToast('State is required');
        return false;
      }

      const editId = document.getElementById('c-edit-id').value;
      const loc = locDropdown ? locDropdown.getValues() : { state: '', district: '', taluk: '' };
      
      // Look up DB IDs for the locations, auto-inserting if missing
      let stateId = null, districtId = null, talukId = null;
      try {
        if (loc.state) {
          const statesRes = await window.listStates();
          let stateObj = statesRes.data.states.find(s => s.name === loc.state);
          if (!stateObj) {
            const res = await window.createState({ name: loc.state, status: "active" });
            stateId = Object.values(res.data.state_insert)[0];
          } else {
            stateId = stateObj.id;
          }

          if (stateId && loc.district) {
            const distRes = await window.listDistrictsByState({ stateId });
            let distObj = distRes.data.districts.find(d => d.name === loc.district);
            if (!distObj) {
              const res = await window.createDistrict({ name: loc.district, stateId, status: "active" });
              districtId = Object.values(res.data.district_insert)[0];
            } else {
              districtId = distObj.id;
            }

            if (districtId && loc.taluk) {
              const talukRes = await window.listTaluksByDistrict({ districtId });
              let talukObj = talukRes.data.taluks.find(t => t.name === loc.taluk);
              if (!talukObj) {
                const res = await window.createTaluk({ name: loc.taluk, districtId, status: "active" });
                talukId = Object.values(res.data.taluk_insert)[0];
              } else {
                talukId = talukObj.id;
              }
            }
          }
        }
      } catch (err) {
        console.error('Failed to resolve location IDs', err);
      }

      const data = {
        name: document.getElementById('c-name').value,
        gstin: document.getElementById('c-gstin').value,
        mobile: document.getElementById('c-mobile').value,
        mobile2: document.getElementById('c-mobile2').value,
        email: document.getElementById('c-email').value,
        address: document.getElementById('c-address').value,
        stateId: stateId,
        districtId: districtId,
        talukId: talukId,
        pincode: document.getElementById('c-pincode').value,
        status: "active"
      };

      try {
        if (editId) { 
          await window.updateCustomer({ id: editId, ...data });
          Utils.showToast('Customer updated'); 
        } else { 
          await window.createCustomer(data);
          Utils.showToast('Customer added'); 
        }
        closeCustomerModal();
        loadCustomers();
      } catch (err) {
        console.error('Save failed:', err);
        Utils.showToast('Failed to save customer');
      }
      return false;
    }

    loadCustomers();

    // Check URL parameters to auto-open modal
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('action') === 'add') {
      setTimeout(openCustomerModal, 500);
    }
  </script>
</body>
</html>
