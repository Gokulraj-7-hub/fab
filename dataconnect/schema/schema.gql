# Users and Permissions
type User @table(name: "fab_users") {
  id: String! @col(name: "usr_id") @default(expr: "uuidV4()")
  username: String! @unique
  passwordHash: String! @col(name: "usr_password")
  name: String! @col(name: "usr_name")
  role: String! @col(name: "usr_role")
  status: String! @col(name: "usr_status")
  createdAt: Timestamp! @col(name: "usr_created_at") @default(expr: "request.time")
  createdBy: User @ref
  updatedAt: Timestamp @col(name: "usr_updated_at")
  updatedBy: User @ref
  deletedAt: Timestamp @col(name: "usr_deleted_at")
  deletedBy: User @ref
}

type UserPermission @table(name: "fab_user_permissions") {
  id: String! @col(name: "perm_id") @default(expr: "uuidV4()")
  user: User! @ref
  moduleName: String! @col(name: "perm_module_name")
  isAllowed: Boolean! @col(name: "perm_is_allowed")
}

