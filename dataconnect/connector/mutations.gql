mutation CreateState($name: String!, $status: String!) @auth(level: PUBLIC) {
  state_insert(data: { name: $name, status: $status })
}

mutation CreateDistrict($name: String!, $stateId: String!, $status: String!) @auth(level: PUBLIC) {
  district_insert(data: { name: $name, stateId: $stateId, status: $status })
}

mutation CreateTaluk($name: String!, $districtId: String!, $status: String!) @auth(level: PUBLIC) {
  taluk_insert(data: { name: $name, districtId: $districtId, status: $status })
