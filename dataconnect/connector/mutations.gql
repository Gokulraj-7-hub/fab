mutation UpdateCustomer(
  $id: String!
  $name: String!
  $gstin: String
  $mobile: String!
  $mobile2: String
  $email: String
  $address: String!
  $stateId: String
  $districtId: String
  $talukId: String
  $pincode: String
  $status: String!
) @auth(level: PUBLIC) {
  customer_update(id: $id, data: {
    name: $name
    gstin: $gstin
    mobile: $mobile
    mobile2: $mobile2
    email: $email
    address: $address
    stateId: $stateId
    districtId: $districtId
    talukId: $talukId
    pincode: $pincode
    status: $status
  })
}

mutation DeleteCustomer($id: String!) @auth(level: PUBLIC) {
  customer_delete(id: $id)
}

