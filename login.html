<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BillFlow</title>
  <meta name="description" content="Login to BillFlow billing and inventory management system">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css?v=3">

  <!-- Firebase Setup -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js",
        "firebase/analytics": "https://www.gstatic.com/firebasejs/11.1.0/firebase-analytics.js",
        "firebase/data-connect": "https://www.gstatic.com/firebasejs/11.1.0/firebase-data-connect.js"
      }
    }
  </script>
  <script type="module" src="assets/js/firebase-init.js?v=3"></script>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <div class="icon"><i class="bi bi-receipt-cutoff"></i></div>
        <h2>BillFlow</h2>
        <p>Billing & Inventory Management System</p>
      </div>

      <form id="login-form" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" class="form-control" id="username" placeholder="Enter username" value="admin" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-control" id="password" placeholder="Enter password" value="admin" required>
            <button type="button" class="toggle-pw" onclick="togglePassword()" id="toggle-pw-btn">
              <i class="bi bi-eye" id="pw-icon"></i>
            </button>
          </div>
        </div>

        <div style="display:flex; align-items:center; justify-content:space-between;">
          <div class="form-check">
            <input type="checkbox" id="remember" checked>
            <label for="remember">Remember me</label>
          </div>
          <a href="#" class="forgot-link" id="forgot-password">Forgot Password?</a>
        </div>

        <div style="margin-top:24px">
          <button type="submit" class="btn btn-primary btn-login" id="btn-login">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
          </button>
        </div>

        <p style="text-align:center; margin-top:20px; font-size:0.75rem; color:var(--text-muted);">
          Demo credentials: admin / admin
        </p>
      </form>
    </div>
  </div>

  <script src="assets/js/store.js"></script>
  <script>
    function togglePassword() {
      const pw = document.getElementById('password');
      const icon = document.getElementById('pw-icon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        pw.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      const userVal = document.getElementById('username').value.trim();
      const passVal = document.getElementById('password').value;

      const matchedUser = Store.getUsers().find(u => u.username.toLowerCase() === userVal.toLowerCase() && u.password === passVal);

      if (matchedUser) {
        sessionStorage.setItem('currentUser', JSON.stringify(matchedUser));
        sessionStorage.setItem('loggedIn', 'true');

        const pageMap = {
          dashboard: 'dashboard.html',
          products: 'products.html',
          customers: 'customers.html',
          suppliers: 'suppliers.html',
          invoices: 'invoice.html',
          returns: 'returns.html',
          inventory: 'inventory.html',
          reports: 'reports.html',
          settings: 'settings.html'
        };

        let redirectPage = 'dashboard.html'; // Admin default
        if (matchedUser.role !== 'Admin') {
          const modulesList = ['dashboard', 'products', 'customers', 'suppliers', 'invoices', 'returns', 'inventory', 'reports', 'settings'];
          // Find first page where permission is explicitly true
          const firstAllowed = modulesList.find(m => matchedUser.permissions && matchedUser.permissions[m] === true);
          if (!firstAllowed) {
            // No pages assigned — warn and abort login
            const btn = document.getElementById('btn-login');
            btn.style.background = '#f59e0b';
            btn.innerHTML = '<i class="bi bi-slash-circle"></i> No pages assigned to this account';
            setTimeout(() => {
              btn.style.background = '';
              btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
            }, 3000);
            return false;
          }
          redirectPage = pageMap[firstAllowed];
        }
        location.href = redirectPage;
      } else {
        const btn = document.getElementById('btn-login');
        btn.style.background = 'var(--danger)';
        btn.innerHTML = '<i class="bi bi-x-circle"></i> Invalid Credentials';
        setTimeout(() => {
          btn.style.background = '';
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
        }, 2000);
      }
      return false;
    }
  </script>
</body>
</html>
