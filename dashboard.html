<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - BillFlow</title>
  <meta name="description" content="BillFlow Dashboard - Business overview and analytics">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css?v=3">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Firebase Setup -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js",
        "firebase/analytics": "https://www.gstatic.com/firebasejs/11.1.0/firebase-analytics.js",
        "firebase/data-connect": "https://www.gstatic.com/firebasejs/11.1.0/firebase-data-connect.js"
      }
    }
  </script>
  <script type="module" src="assets/js/firebase-init.js"></script>
</head>
<body>
  <div class="app-wrapper">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="top-navbar" id="top-navbar"></header>
      <main class="content-area">

        <div class="page-header">
          <div>
            <h1>Dashboard</h1>
            <p>Welcome back! Here's your business overview.</p>
          </div>
          <a href="invoice.html" class="btn btn-primary" id="btn-new-invoice">
            <i class="bi bi-plus-lg"></i> New Invoice
          </a>
        </div>

        <!-- Stat Cards -->
        <div class="grid-4 mb-24" id="stat-cards"></div>

        <!-- Charts & Tables Row -->
        <div class="grid-2 mb-20" id="charts-row">
          <!-- Sales Chart -->
          <div class="card">
            <div class="card-header">
              <h5><i class="bi bi-graph-up" style="color:var(--primary);margin-right:8px"></i>Sales Overview</h5>
              <span class="badge badge-primary">Last 7 Days</span>
            </div>
            <div class="card-body">
              <div class="chart-container">
                <canvas id="sales-chart"></canvas>
              </div>
            </div>
          </div>
          <!-- Category Chart -->
          <div class="card">
            <div class="card-header">
              <h5><i class="bi bi-pie-chart" style="color:var(--info);margin-right:8px"></i>Sales by Category</h5>
              <span class="badge badge-info">Current Month</span>
            </div>
            <div class="card-body">
              <div class="chart-container">
                <canvas id="category-chart"></canvas>
              </div>
            </div>
          </div>
        </div>

        <div class="grid-2-1">
          <!-- Recent Invoices -->
          <div class="card">
            <div class="card-header">
              <h5><i class="bi bi-receipt" style="color:var(--primary);margin-right:8px"></i>Recent Invoices</h5>
              <a href="invoice.html" class="btn btn-sm btn-outline" id="link-view-invoices">View All</a>
            </div>
            <div class="card-body" style="padding:0">
              <div class="table-container">
                <table class="data-table" id="recent-invoices-table">
                  <thead>
                    <tr>
                      <th>Invoice #</th>
                      <th>Date</th>
                      <th>Customer</th>
                      <th>Amount</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody id="recent-invoices-body"></tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- Low Stock Alerts -->
          <div class="card">
            <div class="card-header">
              <h5><i class="bi bi-exclamation-triangle" style="color:var(--warning);margin-right:8px"></i>Low Stock Alert</h5>
            </div>
            <div class="card-body" style="padding:0">
              <div class="table-container">
                <table class="data-table" id="low-stock-table">
                  <thead>
                    <tr>
                      <th>Product</th>
                      <th>Stock</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody id="low-stock-body"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/components.js"></script>
  <script>
    Components.init('Dashboard');

    // Load dashboard data
    const stats = Store.getDashboardStats();

    // Render stat cards
    document.getElementById('stat-cards').innerHTML = `
      <div class="stat-card">
        <div class="stat-icon blue"><i class="bi bi-currency-rupee"></i></div>
        <div class="stat-value">${Utils.currency(stats.totalSales)}</div>
        <div class="stat-label">Total Sales</div>
        <div class="stat-trend up"><i class="bi bi-arrow-up-short"></i> 12.5% from last month</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red"><i class="bi bi-arrow-return-left"></i></div>
        <div class="stat-value">${Utils.currency(stats.totalReturns)}</div>
        <div class="stat-label">Total Product Returns</div>
        <div class="stat-trend down"><i class="bi bi-arrow-down-short"></i> 3.2% from last month</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green"><i class="bi bi-people"></i></div>
        <div class="stat-value">${stats.totalCustomers}</div>
        <div class="stat-label">Total Customers</div>
        <div class="stat-trend up"><i class="bi bi-arrow-up-short"></i> 5 new this month</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange"><i class="bi bi-box-seam"></i></div>
        <div class="stat-value">${stats.totalProducts}</div>
        <div class="stat-label">Total Products</div>
        <div class="stat-trend up"><i class="bi bi-arrow-up-short"></i> 3 added recently</div>
      </div>
    `;

    // Recent Invoices
    const tbody = document.getElementById('recent-invoices-body');
    if (stats.recentInvoices.length) {
      tbody.innerHTML = stats.recentInvoices.map(inv => `
        <tr class="clickable-row" onclick="window.location.href='invoice.html?view=${inv.id}'" title="Click to view invoice">
          <td><strong>${inv.number}</strong></td>
          <td>${Utils.formatDate(inv.date)}</td>
          <td>${inv.customerName}</td>
          <td><strong>${Utils.currency(inv.netTotal)}</strong></td>
          <td><span class="badge badge-success">Paid</span></td>
        </tr>
      `).join('');
    } else {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted" style="padding:24px">No invoices yet</td></tr>';
    }

    // Low Stock
    const lowBody = document.getElementById('low-stock-body');
    if (stats.lowStockProducts.length) {
      lowBody.innerHTML = stats.lowStockProducts.map(p => `
        <tr class="clickable-row" onclick="window.location.href='products.html?edit=${p.id}'" title="Click to view/edit product">
          <td>${p.name}</td>
          <td><strong>${p.stock}</strong></td>
          <td><span class="badge ${p.stock <= 5 ? 'badge-danger' : 'badge-warning'}">${p.stock <= 5 ? 'Critical' : 'Low'}</span></td>
        </tr>
      `).join('');
    } else {
      lowBody.innerHTML = '<tr><td colspan="3" class="text-center text-muted" style="padding:24px">All stocks are healthy</td></tr>';
    }

    // Sales Chart
    new Chart(document.getElementById('sales-chart'), {
      type: 'line',
      data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        datasets: [{
          label: 'Sales (₹)',
          data: [12500, 8900, 15600, 7800, 22000, 18500, 9200],
          borderColor: '#0066cc',
          backgroundColor: 'rgba(0,102,204,0.1)',
          fill: true,
          tension: 0.4,
          borderWidth: 2,
          pointRadius: 4,
          pointBackgroundColor: '#0066cc'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { callback: v => '₹' + (v/1000) + 'K' }, grid: { color: '#F3F4F6' } },
          x: { grid: { display: false } }
        }
      }
    });

    // Category Chart
    new Chart(document.getElementById('category-chart'), {
      type: 'doughnut',
      data: {
        labels: ['Sarees', 'Shirts', 'Trousers', 'Home Textile', 'Others'],
        datasets: [{
          data: [35, 20, 18, 15, 12],
          backgroundColor: ['#0066cc', '#3399ff', '#66b3ff', '#99ccff', '#cce5ff'],
          borderWidth: 0,
          hoverOffset: 6
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '65%',
        plugins: {
          legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true, pointStyle: 'circle', font: { size: 11 } } }
        }
      }
    });
  </script>
</body>
</html>
